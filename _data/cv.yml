  summary: My research interest lie at the intersection of sensor fusion, signal processing, and machine learning/artificial intelligence (AI), with a focus on enhancing sensor performance and decision-making in complex systems. Specifically, I aim to explore the application of sensor fusion techniques to improve sensor accuracy, optimize data processing, and enhance situational awareness in both autonomous systems and human-computer interfaces. My goal is to contribute to the development of intelligent systems that can operate effectively in dynamic environments and make reliable and precise real-time decisions. 

